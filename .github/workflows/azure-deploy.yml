name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history required for secret scanning diff
          fetch-depth: 0

      # ── Secret scanning — must pass before any build or deploy ────────────
      # Scans the diff between the previous commit and HEAD for leaked secrets.
      # Fails the pipeline if any are found, preventing deployment.
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # ── Prepare Backend ────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # ── Copy frontend build into backend folder for deployment ─────────────
      - name: Copy frontend dist to backend
        run: cp -r frontend/dist backend/frontend-dist

      # ── Deploy to Azure ────────────────────────────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'resource-utility'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
