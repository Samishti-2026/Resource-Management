name: Backend-prod CI/CD

on:
  push:
    branches:
      - dev-vishal
      - vishal-stage
      - vishal-prod

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Login to Azure Container Registry
      # =========================
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3

        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # =========================
      # Build Docker Image
      # =========================
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }} .

      # =========================
      # Push Docker Image
      # =========================
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      # =====================================================
      # DEPLOY DEV
      # =====================================================
      - name: Deploy DEV Web App
        if: github.ref == 'refs/heads/dev-vishal'
        uses: azure/webapps-deploy@v3

        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      # =====================================================
      # DEPLOY STAGE
      # =====================================================
      - name: Deploy STAGE Web App
        if: github.ref == 'refs/heads/vishal-stage'
        uses: azure/webapps-deploy@v3

        with:
          app-name: ${{ secrets.STAGE_AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.STAGE_AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      # =====================================================
      # DEPLOY PROD
      # =====================================================
      - name: Deploy PROD Web App
        if: github.ref == 'refs/heads/vishal-prod'
        uses: azure/webapps-deploy@v3

        with:
          app-name: ${{ secrets.PROD_AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.PROD_AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      # =========================
      # Verify GitHub CLI
      # =========================
      - name: Verify GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      # =========================
      # Create PR DEV -> STAGE
      # =========================
      - name: Create PR from DEV to STAGE
        if: github.ref == 'refs/heads/dev-vishal'

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          gh pr create \
            --base vishal-stage \
            --head dev-vishal \
            --title "Promote DEV to STAGE" \
            --body "Automated PR after successful DEV deployment" \
          || true

      # =========================
      # Create PR STAGE -> PROD
      # =========================
      - name: Create PR from STAGE to PROD
        if: github.ref == 'refs/heads/vishal-stage'

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          gh pr create \
            --base vishal-prod \
            --head vishal-stage \
            --title "Promote STAGE to PROD" \
            --body "Automated PR after successful STAGE deployment" \
          || true
