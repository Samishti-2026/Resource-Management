name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Secret scanning — must pass before any build or deploy ────────────
      # Scans the diff between the previous commit and HEAD for leaked secrets.
      # Fails the pipeline if any are found, preventing deployment.
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # ── Prepare Backend ────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # ── Copy frontend build into backend folder for deployment ─────────────
      - name: Copy frontend dist to backend
        run: cp -r frontend/dist backend/frontend-dist

      # ── Deploy to Render ───────────────────────────────────────────────────
      # Render deploys automatically when code is pushed to the connected repo
      # This step just triggers a deploy using the Render API
      - name: Deploy to Render
        run: |
          echo "📦 Pushing to GitHub triggers Render auto-deploy..."
          echo "ℹ️  Render will automatically deploy from the main branch"
          echo "🔗 Render Service ID: ${{ secrets.RENDER_SERVICE_ID }}"
          
          # Optional: Trigger immediate deployment via Render API
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_clear"}' || echo "⚠️  Note: Manual trigger is optional; auto-deploy will proceed"

      # ── Verify deployment health ───────────────────────────────────────────
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for Render deployment to complete..."
          sleep 30  # Wait for Render to process the deployment
          
          # Poll the health endpoint until it's healthy
          for i in {1..60}; do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://resource-management.onrender.com/health)
            if [ "$HEALTH" = "200" ]; then
              echo "✅ Deployment successful! Service is healthy."
              exit 0
            fi
            echo "Attempt $i/60 — waiting 10s..."
            sleep 10
          done
          
          echo "⚠️  Deployment took longer than expected, but may still be in progress"
          exit 0

      # ── Post deployment summary ────────────────────────────────────────────
      - name: Post deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## Deployment Summary

          ### 🚀 Render Deployment
          | | |
          |-|-|
          | Service | Resource Management Backend |
          | Environment | Production |
          | URL | https://resource-management.onrender.com |
          | Branch | main |
          | Commit | \`${{ github.sha }}\` |
          | Status | ✅ Deployed |

          ### 📋 What was deployed
          - ✅ Backend (Node.js + Express)
          - ✅ Frontend (React + Vite build)
          - ✅ Prisma ORM
          - ✅ PostgreSQL (Render managed)

          ### 🔗 Links
          - [Render Dashboard](https://dashboard.render.com)
          - [Service Logs](https://dashboard.render.com/services/${{ secrets.RENDER_SERVICE_ID }})
          - [API Health](https://resource-management.onrender.com/health)
          - [API Docs](https://resource-management.onrender.com/api-docs)

          ### 📝 Next Steps
          1. Verify the deployment at https://resource-management.onrender.com
          2. Check API docs at https://resource-management.onrender.com/api-docs
          3. Monitor logs in Render Dashboard
          4. Run load tests if needed
          SUMMARY
