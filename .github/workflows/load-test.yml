# ══════════════════════════════════════════════════════════════════════════════
# FULLY AUTOMATIC CI PIPELINE
# Trigger: git push → build image → push DockerHub → run load test
# No manual steps required
# ══════════════════════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & Push to DockerHub
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local validation only)
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          dockerfile: ./backend/Dockerfile
          push:       false
          tags:       timesheet-backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print build success
        run: |
          echo "✅ Docker image built successfully (validation only - deployment via Render)"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — JMeter Load Test (auto runs after build)
  # ════════════════════════════════════════════════════════════════════════════
  load-test:
    name: 🔥 JMeter Load Test
    runs-on: ubuntu-latest
    needs: build-and-push      # auto triggers after Job 1 succeeds

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Verify deployed backend is healthy (optional - continue even if unhealthy)
      - name: Verify backend health
        run: |
          echo "Testing deployed backend at https://resource-management-backend-j7ft.onrender.com"
          HEALTH=$(curl -sf https://resource-management-backend-j7ft.onrender.com/health || echo "FAILED")
          echo "Health response: $HEALTH"
          if [ "$HEALTH" != "FAILED" ]; then
            echo "$HEALTH" | grep -q '"status":"ok"'   && echo "✅ Backend status OK" || echo "⚠️  Backend status not OK"
            echo "$HEALTH" | grep -q '"db":"connected"' && echo "✅ DB connected" || echo "⚠️  DB not connected"
          else
            echo "⚠️  Backend health check failed - continuing with load test anyway"
          fi

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Create Load-Test directories
        run: mkdir -p Load-Test/report

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xf apache-jmeter-5.6.3.tgz

      - name: Run JMeter load test
        run: |
          apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t  Load-Test/timesheet.jmx \
            -l  Load-Test/results.jtl \
            -e \
            -o  Load-Test/report \
            -j  Load-Test/jmeter.log

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report-${{ github.run_number }}
          path: Load-Test/report/
          retention-days: 30

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-raw-${{ github.run_number }}
          path: |
            Load-Test/results.jtl
            Load-Test/jmeter.log
          retention-days: 7

      # Fail the build if error rate > 5%
      - name: Check performance thresholds
        run: |
          if [ ! -f Load-Test/results.jtl ]; then
            echo "❌ JMeter results file not found"
            exit 1
          fi
          
          TOTAL=$(tail -n +2 Load-Test/results.jtl | wc -l)
          ERRORS=$(tail -n +2 Load-Test/results.jtl | awk -F',' '{if($7=="false") count++} END {print count+0}')

          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "❌ No results found — JMeter may have failed to run"
            exit 1
          fi
          
          if [ -z "$ERRORS" ]; then
            ERRORS=0
          fi

          ERROR_PCT=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Total samples : $TOTAL"
          echo "  Errors        : $ERRORS"
          echo "  Error rate    : $ERROR_PCT%"
          echo "  Threshold     : 5%"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAIL=$(echo "$ERROR_PCT > 5" | bc)
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ FAILED: Error rate $ERROR_PCT% exceeds 5% threshold"
            exit 1
          fi
          echo "✅ PASSED: Error rate $ERROR_PCT% is within threshold"

      # Post clean summary to GitHub Actions tab
      - name: Post results summary
        if: always()
        run: |
          if [ ! -f Load-Test/results.jtl ]; then
            echo "⚠️  JMeter results not found, skipping summary"
            exit 0
          fi
          
          TOTAL=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | wc -l)
          ERRORS=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' '{if($7=="false") count++} END {print count+0}')
          AVG=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' '{if(NF>=2 && $2+0==$2){sum+=$2; count++}} END {printf "%.0f", count>0?sum/count:0}')
          MAX=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' 'BEGIN{max=0}{if(NF>=2 && $2+0==$2 && $2>max)max=$2}END{print max}')
          ERROR_PCT=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc 2>/dev/null || echo "N/A")

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## CI Pipeline — Run #${{ github.run_number }}

          ### 🐳 Docker Image
          | | |
          |-|-|
          | Image | \`shashankp08/timesheet-backend:latest\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |

          ### 🔥 Load Test Results
          | Metric | Value |
          |--------|-------|
          | Database | Render PostgreSQL (Singapore) |
          | Threads | 100 users |
          | Total Samples | $TOTAL |
          | Errors | $ERRORS |
          | Error Rate | $ERROR_PCT% |
          | Avg Response | ${AVG}ms |
          | Max Response | ${MAX}ms |

          📊 Full HTML report → **Artifacts → jmeter-report-${{ github.run_number }}**
          SUMMARY