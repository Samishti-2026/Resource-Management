# ══════════════════════════════════════════════════════════════════════════════
# FULLY AUTOMATIC CI PIPELINE
# Trigger: git push → build image → push DockerHub → run load test
# No manual steps required
# ══════════════════════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & Push to DockerHub
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Auto tags:
      # main   → shashankp08/timesheet-backend:latest
      # develop → shashankp08/timesheet-backend:develop
      # always → shashankp08/timesheet-backend:sha-abc1234
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shashankp08/timesheet-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          dockerfile: ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print pushed tags
        run: |
          echo "✅ Image pushed:"
          echo "${{ steps.meta.outputs.tags }}"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — JMeter Load Test (auto runs after build)
  # ════════════════════════════════════════════════════════════════════════════
  load-test:
    name: 🔥 JMeter Load Test
    runs-on: ubuntu-latest
    needs: build-and-push      # auto triggers after Job 1 succeeds

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Create .env with Render DB + test settings
      - name: Create backend .env
        run: |
          cat > backend/.env << ENVEOF
          DATABASE_URL=postgresql://resourcemgmtdb_user:ZHB5RT5Uk2yP2bK9PnBhj6i5YVrHjkci@dpg-d8bssqjeo5us73dnuiqg-a.singapore-postgres.render.com/resourcemgmtdb?connection_limit=10&pool_timeout=30&sslmode=require
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRES_IN=2h
          JWT_REFRESH_EXPIRES_IN=7d
          PORT=3000
          NODE_ENV=test
          CORS_ORIGIN=http://localhost:5173
          BCRYPT_ROUNDS=8
          ENVEOF

      # Pull the image we just pushed and start backend
      - name: Pull latest image and start backend
        run: |
          docker compose up -d backend
          echo "Waiting for backend..."
          for i in {1..40}; do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "✅ Backend ready after ${i} attempts!"
              break
            fi
            echo "Attempt $i/40 — retrying in 5s..."
            sleep 5
          done

      # Confirm backend + Render DB are both healthy
      - name: Verify health
        run: |
          HEALTH=$(curl -sf http://localhost:3000/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'   || (echo "❌ Backend unhealthy!" && exit 1)
          echo "$HEALTH" | grep -q '"db":"connected"' || (echo "❌ Render DB not connected!" && exit 1)
          echo "✅ Backend + Render DB both healthy!"

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Create Load-Test directories
        run: mkdir -p Load-Test/report

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xf apache-jmeter-5.6.3.tgz

      - name: Run JMeter load test
        run: |
          apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t  jmeter-test-plan.jmx \
            -l  Load-Test/results.jtl \
            -e \
            -o  Load-Test/report \
            -j  Load-Test/jmeter.log

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report-${{ github.run_number }}
          path: Load-Test/report/
          retention-days: 30

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-raw-${{ github.run_number }}
          path: |
            Load-Test/results.jtl
            Load-Test/jmeter.log
          retention-days: 7

      # Fail the build if error rate > 5%
      - name: Check performance thresholds
        run: |
          if [ ! -f Load-Test/results.jtl ]; then
            echo "❌ JMeter results file not found"
            exit 1
          fi
          
          TOTAL=$(tail -n +2 Load-Test/results.jtl | wc -l)
          ERRORS=$(tail -n +2 Load-Test/results.jtl | awk -F',' '{if($7=="false") count++} END {print count+0}')

          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "❌ No results found — JMeter may have failed to run"
            exit 1
          fi
          
          if [ -z "$ERRORS" ]; then
            ERRORS=0
          fi

          ERROR_PCT=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Total samples : $TOTAL"
          echo "  Errors        : $ERRORS"
          echo "  Error rate    : $ERROR_PCT%"
          echo "  Threshold     : 5%"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAIL=$(echo "$ERROR_PCT > 5" | bc)
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ FAILED: Error rate $ERROR_PCT% exceeds 5% threshold"
            exit 1
          fi
          echo "✅ PASSED: Error rate $ERROR_PCT% is within threshold"

      # Post clean summary to GitHub Actions tab
      - name: Post results summary
        if: always()
        run: |
          if [ ! -f Load-Test/results.jtl ]; then
            echo "⚠️  JMeter results not found, skipping summary"
            exit 0
          fi
          
          TOTAL=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | wc -l)
          ERRORS=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' '{if($7=="false") count++} END {print count+0}')
          AVG=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' '{if(NF>=2 && $2+0==$2){sum+=$2; count++}} END {printf "%.0f", count>0?sum/count:0}')
          MAX=$(tail -n +2 Load-Test/results.jtl 2>/dev/null | awk -F',' 'BEGIN{max=0}{if(NF>=2 && $2+0==$2 && $2>max)max=$2}END{print max}')
          ERROR_PCT=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc 2>/dev/null || echo "N/A")

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## CI Pipeline — Run #${{ github.run_number }}

          ### 🐳 Docker Image
          | | |
          |-|-|
          | Image | \`shashankp08/timesheet-backend:latest\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |

          ### 🔥 Load Test Results
          | Metric | Value |
          |--------|-------|
          | Database | Render PostgreSQL (Singapore) |
          | Threads | 100 users |
          | Total Samples | $TOTAL |
          | Errors | $ERRORS |
          | Error Rate | $ERROR_PCT% |
          | Avg Response | ${AVG}ms |
          | Max Response | ${MAX}ms |

          📊 Full HTML report → **Artifacts → jmeter-report-${{ github.run_number }}**
          SUMMARY

      - name: Stop containers
        if: always()
        run: docker compose down