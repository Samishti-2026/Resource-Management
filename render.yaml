# Render Infrastructure as Code Configuration
# This file defines your Render infrastructure
# Deploy using: render deploy render.yaml
#
# NOTE: This uses an external PostgreSQL database hosted on Render
# Database: dpg-d8bssqjeo5us73dnuiqg-a.singapore-postgres.render.com/resourcemgmtdb
# Region: Singapore

services:
  # ════════════════════════════════════════════════════════════════════════════
  # BACKEND SERVICE — Node.js + Express API
  # ════════════════════════════════════════════════════════════════════════════
  - type: web
    name: resource-management
    env: node
    plan: starter  # starter, standard, pro
    
    # GitHub repository integration
    repo: https://github.com/shashank-p-08/Resource-Management
    branch: main
    region: singapore  # Match database region for lower latency
    
    # Build configuration
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node backend/src/server.js
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 10  # seconds
    maxInstances: 2
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        value: "*"
      - key: LOG_LEVEL
        value: info
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      
      # External PostgreSQL Database (Singapore)
      - key: DATABASE_URL
        value: postgresql://resourcemgmtdb_user:ZHB5RT5Uk2yP2bK9PnBhj6i5YVrHjkci@dpg-d8bssqjeo5us73dnuiqg-a.singapore-postgres.render.com/resourcemgmtdb
      
      # Secrets (from GitHub Actions secrets)
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: JWT_REFRESH_SECRET
        fromSecret: JWT_REFRESH_SECRET
